name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-build:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Everything SDK
        shell: pwsh
        run: |
          $zipPath = Join-Path $env:RUNNER_TEMP "Everything-SDK.zip"
          $extractRoot = Join-Path $env:RUNNER_TEMP "everything-sdk"
          Invoke-WebRequest "https://www.voidtools.com/Everything-SDK.zip" -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractRoot -Force

          $sdkHeader = Get-ChildItem -Path $extractRoot -Recurse -Filter Everything.h |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $sdkHeader) {
            throw "Everything.h was not found after extracting the SDK archive."
          }

          $sdkRoot = Split-Path (Split-Path $sdkHeader -Parent) -Parent
          "EVERYTHING_SDK_DIR=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DEVERYTHING_SDK_DIR="$env:EVERYTHING_SDK_DIR"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Test
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure
