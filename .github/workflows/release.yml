name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-release:
    name: Windows Release
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Everything3 SDK
        shell: pwsh
        run: |
          $zipPath = Join-Path $env:RUNNER_TEMP "Everything-SDK-3.0.0.9.zip"
          $extractRoot = Join-Path $env:RUNNER_TEMP "everything3-sdk"
          Invoke-WebRequest "https://github.com/voidtools/everything_sdk3/releases/download/3.0.0.9/Everything-SDK-3.0.0.9.zip" -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractRoot -Force

          $sdkHeader = Get-ChildItem -Path $extractRoot -Recurse -Filter Everything3.h |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $sdkHeader) {
            throw "Everything3.h was not found after extracting the SDK archive."
          }

          $sdkRoot = Split-Path (Split-Path $sdkHeader -Parent) -Parent
          "EVERYTHING_SDK_DIR=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DEVERYTHING_SDK_DIR="$env:EVERYTHING_SDK_DIR"

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Test
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $name = "everything-mcp-$version-windows-x64"
          $staging = Join-Path $env:RUNNER_TEMP $name
          New-Item -ItemType Directory -Path $staging -Force | Out-Null

          Copy-Item build\Release\everything-mcp.exe $staging
          Copy-Item build\Release\Everything3_x64.dll $staging
          Copy-Item README.md $staging
          Copy-Item LICENSE $staging
          Copy-Item THIRD_PARTY_NOTICES.md $staging
          Copy-Item CHANGELOG.md $staging

          $zipPath = "$name.zip"
          Compress-Archive -Path "$staging\*" -DestinationPath $zipPath -Force

          $hash = Get-FileHash $zipPath -Algorithm SHA256
          "$($hash.Hash.ToLowerInvariant())  $zipPath" | Out-File -FilePath checksums.txt -Encoding ascii

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $notes = @"
          ## everything-mcp $version

          Windows x64 build of everything-mcp.

          Requires:
          - Everything 1.5 running non-elevated
          - Windows 10/11 x64

          Package contents:
          - everything-mcp.exe
          - Everything3_x64.dll
          - README.md
          - LICENSE
          - THIRD_PARTY_NOTICES.md
          - CHANGELOG.md
          "@
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          $notes | Out-File -FilePath $notesPath -Encoding utf8

          gh release create "${{ github.ref_name }}" `
            "everything-mcp-$version-windows-x64.zip" `
            "checksums.txt" `
            --title "everything-mcp $version" `
            --notes-file $notesPath
